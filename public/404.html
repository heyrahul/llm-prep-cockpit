<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LLM Engineer Prep</title>
    <script>
      // Single-Page-Apps for GitHub Pages (MIT, rafgraph/spa-github-pages).
      // GH Pages serves this file for any unknown path (e.g. a deep link to
      // /llm-prep-cockpit/module/m2-rag on a fresh load). It re-encodes the
      // path into a query string and bounces to index.html, whose inline
      // script in index.html decodes it back via history.replaceState
      // before React mounts, so client-side routing still lands correctly.
      var pathSegmentsToKeep = 1; // keep "/llm-prep-cockpit"
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
